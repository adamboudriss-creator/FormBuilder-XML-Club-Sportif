<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Inscription Club Sportif</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h2>Inscription Club Sportif</h2>

</div>

<div class="card-body">

<form>

<div class="mb-3">
<label class="form-label">Nom</label>
<input type="text"
class="form-control"
name="nom"
required
minlength="3">
</div>

<div class="mb-3">
<label class="form-label">Prénom</label>
<input type="text"
class="form-control"
name="prenom"
required
minlength="3">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email"
class="form-control"
name="email"
required>
</div>

<div class="mb-3">
<label class="form-label">Téléphone</label>
<input type="text"
class="form-control"
name="telephone"
pattern="[0-9]{10}"
required>
</div>

<div class="mb-3">
<label class="form-label">Âge</label>
<input type="number"
class="form-control"
name="age"
required>
</div>

<div class="mb-3">

<label class="form-label">
Sport
</label>

<select class="form-select"
name="sport">

<option>Football</option>
<option>Basketball</option>
<option>Natation</option>
<option>Tennis</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">
Niveau
</label>

<select class="form-select"
name="niveau">

<option>Débutant</option>
<option>Intermédiaire</option>
<option>Avancé</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">
Adresse
</label>

<textarea class="form-control"
rows="4"
name="adresse">
</textarea>

</div>

<div class="form-check mb-3">

<input type="checkbox"
class="form-check-input"
id="certificat">

<label class="form-check-label"
for="certificat">

Certificat médical fourni

</label>

</div>

<div class="form-check mb-3">

<input type="checkbox"
class="form-check-input"
id="conditions"
required>

<label class="form-check-label"
for="conditions">

J'accepte les conditions

</label>

</div>

<button type="submit"
class="btn btn-success">

S'inscrire

</button>

<button type="reset"
class="btn btn-secondary ms-2">

Réinitialiser

</button>

</form>

</div>

</div>

</div>

</body>

</html>
